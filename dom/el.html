<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practise</title>
    <style>
        .para{
            background-color: red;
            color:white;
            text-align: center;
        }
        .newpara{
            background-color: blue;
        }
    </style>
</head>
<body>
    <p class="para"  > Lorem ipsum dolor sit amet consectetur adipisicing elit. Officiis, reprehenderit</p>

    <script>
        let para = document.querySelector('p')
        para.classList.add('para', 'newpara')
    </script>
    
</body>
</html>
